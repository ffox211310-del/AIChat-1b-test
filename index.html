<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Light AI Chat</title>
  <style>
    :root{
      --bg:#000;
      --panel:#050b14;
      --panel2:#08101d;
      --line:#12304a;
      --text:#e8f6ff;
      --muted:#8fb8d6;
      --blue:#1b6cff;
      --cyan:#26d7ff;
      --user:#10304f;
      --bot:#071b2d;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#000 0%,#040816 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    .app{
      height:100dvh;
      display:flex;
      flex-direction:column;
      max-width:920px;
      margin:0 auto;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      background:rgba(0,0,0,.72);
    }
    .top{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--line);
      background:rgba(5,11,20,.92);
    }
    .title{font-size:18px;font-weight:700;letter-spacing:.02em}
    .sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
    .controls{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}
    select,input,button,textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:12px;
      font-size:15px;
      outline:none;
    }
    select,input,textarea{padding:12px}
    button{
      padding:12px 14px;
      font-weight:700;
      background:linear-gradient(90deg,var(--blue),var(--cyan));
      color:#00111d;
      border:none;
    }
    button:disabled,input:disabled,select:disabled{opacity:.55}
    .status{margin-top:8px;font-size:12px;color:var(--muted);min-height:18px}
    .chat{flex:1;overflow:auto;padding:14px;scroll-behavior:auto}
    .msg{max-width:92%;padding:12px 14px;margin:0 0 10px;border:1px solid var(--line);border-radius:16px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .user{margin-left:auto;background:var(--user)}
    .bot{margin-right:auto;background:var(--bot)}
    .composer{padding:12px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(5,11,20,.94)}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px}
    textarea{resize:none;min-height:52px;max-height:120px}
    .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.4}
    a{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title">Light AI Chat</div>
      <div class="sub">スマホ向け・軽量・アニメーションなし。初回にモデルをダウンロードして端末内にキャッシュします。</div>
      <div class="controls">
        <select id="model">
          <option value="HuggingFaceTB/SmolLM2-135M-Instruct">SmolLM2 135M</option>
          <option value="HuggingFaceTB/SmolLM2-360M-Instruct" selected>SmolLM2 360M</option>
          <option value="Qwen/Qwen2.5-0.5B-Instruct">Qwen2.5 0.5B</option>
        </select>
        <button id="load">DL</button>
      </div>
      <div class="status" id="status">未読み込み</div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="composer">
      <div class="row">
        <textarea id="input" placeholder="メッセージを入力" disabled></textarea>
        <button id="send" disabled>送信</button>
      </div>
      <div class="hint">推奨: Chrome / Edge の最新モバイル版。端末が重い場合は 135M を使ってください。</div>
    </div>
  </div>
  <script type="module">
    import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";
    env.allowLocalModels = false;
    const el = {
      model: document.getElementById('model'),
      load: document.getElementById('load'),
      status: document.getElementById('status'),
      chat: document.getElementById('chat'),
      input: document.getElementById('input'),
      send: document.getElementById('send')
    };
    let generator = null;
    let messages = [{ role: 'system', content: 'You are a concise helpful assistant.' }];
    function add(role, text){
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      el.chat.appendChild(div);
      el.chat.scrollTop = el.chat.scrollHeight;
      return div;
    }
    async function loadModel(){
      el.load.disabled = true;
      el.send.disabled = true;
      el.input.disabled = true;
      const name = el.model.value;
      el.status.textContent = '読み込み中: ' + name;
      generator = await pipeline('text-generation', name, {
        dtype: 'q8',
        progress_callback: (p) => {
          if(p.status === 'progress' && p.loaded && p.total){
            const mb = Math.round(p.loaded/1024/1024);
            const total = Math.round(p.total/1024/1024);
            el.status.textContent = `ダウンロード中: ${mb}MB / ${total}MB`;
          }
        }
      });
      el.status.textContent = '準備完了';
      el.input.disabled = false;
      el.send.disabled = false;
      el.input.focus();
    }
    async function send(){
      const text = el.input.value.trim();
      if(!text || !generator) return;
      el.input.value = '';
      messages.push({ role: 'user', content: text });
      add('user', text);
      el.send.disabled = true;
      el.input.disabled = true;
      const typing = add('bot', '...');
      const prompt = messages.map(m => `<|im_start|>${m.role}
${m.content}<|im_end|>`).join('
') + '
<|im_start|>assistant
';
      const out = await generator(prompt, { max_new_tokens: 160, temperature: 0.7, top_p: 0.9, repetition_penalty: 1.08 });
      const reply = (out?.[0]?.generated_text || '').replace(prompt, '').trim() || '応答を生成できませんでした。';
      typing.textContent = reply;
      messages.push({ role: 'assistant', content: reply });
      el.send.disabled = false;
      el.input.disabled = false;
      el.input.focus();
    }
    el.load.addEventListener('click', loadModel);
    el.send.addEventListener('click', send);
    el.input.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
    add('bot', 'モデルを読み込んで開始してください。');
  </script>
</body>
</html>
