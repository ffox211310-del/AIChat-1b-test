<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lightweight AI Chat</title>
    
    <!-- Transformers.js CDN -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // ローカルキャッシュ使用（再ダウンロード防止）
        env.allowLocalModels = false;
        
        const DOM = {
            chat: document.getElementById('chat'),
            input: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            status: document.getElementById('status'),
            modelSelect: document.getElementById('model-select')
        };

        let generator = null;
        let isProcessing = false;

        // モデルロード処理
        async function loadModel() {
            if (generator) return;
            
            DOM.status.textContent = 'モデルDL中... (初回のみ)';
            DOM.sendBtn.disabled = true;
            
            try {
                // 軽量モデル指定: TinyLlama 1.1B Chat (Q4)
                // さらに軽くしたい場合は 'Xenova/LaMini-Flan-T5-77M' などに変更
                const modelId = DOM.modelSelect.value;
                
                generator = await pipeline('text-generation', modelId, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            DOM.status.textContent = `DL: ${Math.round(p.progress)}%`;
                        }
                    }
                });
                
                DOM.status.textContent = '準備完了';
                DOM.sendBtn.disabled = false;
                addSystemMessage('モデルの読み込みが完了しました。');
            } catch (e) {
                DOM.status.textContent = 'エラー: ' + e.message;                console.error(e);
            }
        }

        // メッセージ追加（アニメーションなし・即時DOM挿入）
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.textContent = text; // XSS対策＆高速化のためtextContent
            DOM.chat.appendChild(div);
            // スムーズスクロール禁止・即時スクロール
            DOM.chat.scrollTop = DOM.chat.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg msg-system';
            div.textContent = text;
            DOM.chat.appendChild(div);
        }

        // 送信処理
        async function handleSend() {
            const text = DOM.input.value.trim();
            if (!text || isProcessing || !generator) return;

            isProcessing = true;
            DOM.input.value = '';
            addMessage('user', text);
            
            DOM.status.textContent = '生成中...';
            
            try {
                const prompt = `<|system|>\nYou are a helpful assistant.</s>\n<|user|>\n${text}</s>\n<|assistant|>`;
                
                const output = await generator(prompt, {
                    max_new_tokens: 256,
                    temperature: 0.7,
                    do_sample: true,
                });

                // レスポンスからアシスタント部分のみ抽出
                let reply = output[0].generated_text.split('<|assistant|>').pop().trim();
                // 特殊トークン除去
                reply = reply.replace(/<\/?[^>]+(>|$)/g, "").replace(/\|/g, "");
                
                addMessage('ai', reply);
            } catch (e) {
                addMessage('system', '生成エラー: ' + e.message);
            } finally {                isProcessing = false;
                DOM.status.textContent = '待機中';
            }
        }

        // イベントバインド（イベント委譲で軽量化）
        DOM.sendBtn.addEventListener('click', handleSend);
        DOM.input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing) handleSend();
        });
        DOM.modelSelect.addEventListener('change', () => {
            generator = null;
            DOM.status.textContent = 'モデル変更: 送信ボタンで再DL';
            DOM.sendBtn.disabled = true;
        });

        // 初期化
        addSystemMessage('「モデル読込」を押すか、メッセージを送信するとDL開始');
    </script>

    <style>
        /* リセット & 基本設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
        html, body { 
            height: 100%; 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            overflow: hidden; /* 全体スクロール防止 */
        }

        /* レイアウト */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* モバイルアドレスバー対応 */
            max-width: 600px;
            margin: 0 auto;
        }

        /* ヘッダー */
        header {
            padding: 12px 16px;
            border-bottom: 1px solid #0055ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            z-index: 10;        }
        h1 { font-size: 18px; color: #00ccff; font-weight: 700; }
        #status { font-size: 12px; color: #0055ff; }

        /* チャットエリア */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: auto !important; /* スムーズスクロール無効化 */
        }

        /* メッセージバブル */
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            border: 1px solid transparent;
        }
        .msg-user {
            align-self: flex-end;
            background: #0055ff;
            color: #fff;
        }
        .msg-ai {
            align-self: flex-start;
            background: #111;
            border-color: #00ccff;
            color: #e0f7ff;
        }
        .msg-system {
            align-self: center;
            font-size: 12px;
            color: #666;
            padding: 4px;
        }

        /* 入力エリア */
        .input-area {
            padding: 12px;
            border-top: 1px solid #0055ff;
            background: #000;
            display: flex;
            gap: 8px;
            align-items: center;        }
        
        select, input, button {
            background: #111;
            color: #fff;
            border: 1px solid #0055ff;
            padding: 12px;
            font-size: 16px; /* iOSズーム防止 */
            outline: none;
            appearance: none;
        }
        
        #model-select { width: 30%; font-size: 12px; padding: 12px 4px;}
        #user-input { flex: 1; }
        #send-btn { 
            background: #00ccff; 
            color: #000; 
            font-weight: bold; 
            min-width: 70px;
            border: none;
        }
        #send-btn:disabled { opacity: 0.3; }
        #send-btn:active:not(:disabled) { background: #0055ff; }

        /* スクロールバー最小化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0055ff; }
        ::-webkit-scrollbar-track { background: #000; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI CHAT</h1>
            <span id="status">未接続</span>
        </header>
        
        <div id="chat"></div>
        
        <div class="input-area">
            <select id="model-select">
                <option value="Xenova/tinyllama-1.1b-chat-v0.3">TinyLlama (推奨)</option>
                <option value="Xenova/LaMini-Flan-T5-77M">LaMini-77M (最軽量)</option>
                <option value="Xenova/Qwen1.5-0.5B-Chat">Qwen1.5-0.5B</option>
            </select>
            <input type="text" id="user-input" placeholder="メッセージ..." autocomplete="off">
            <button id="send-btn">送信</button>
        </div>
    </div>
</body>
</html>
