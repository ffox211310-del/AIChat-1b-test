<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local AI Chat</title>
    <style>
        /* アニメーションとトランジションを強制無効化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: none !important;
            animation: none !important;
        }

        body {
            background-color: #000000; /* 黒 */
            color: #00BFFF; /* 水色 */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #003399; /* 青 */
            color: #00BFFF; /* 水色 */
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #00BFFF;
        }

        #status {
            font-size: 12px;
            margin-top: 5px;
            color: #00BFFF;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user {
            background-color: #003399; /* 青 */
            color: #00BFFF; /* 水色 */
            align-self: flex-end;
            border: 1px solid #00BFFF;
        }

        .ai {
            background-color: #000000; /* 黒 */
            color: #00BFFF; /* 水色 */
            align-self: flex-start;
            border: 1px solid #003399; /* 青 */
        }

        #input-area {
            display: flex;
            padding: 10px;
            background-color: #000000;
            border-top: 2px solid #003399;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background-color: #000000;
            border: 1px solid #00BFFF;
            color: #00BFFF;
            font-size: 16px; /* スマホでの自動ズーム防止 */
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #003399;
        }

        button {
            padding: 12px 20px;
            background-color: #003399;
            color: #00BFFF;
            border: 1px solid #00BFFF;
            font-weight: bold;
            font-size: 16px;
        }

        button:disabled {
            background-color: #111111;
            color: #333333;
            border-color: #333333;
        }
    </style>
</head>
<body>

    <header>
        <div>Local AI Chat</div>
        <div id="status">システム起動中...</div>
    </header>

    <div id="chat-container">
        </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

        // ローカルモデルの検索を無効化し、Hugging Faceから直接取得する設定
        env.allowLocalModels = false;

        const statusEl = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let generator;

        // モデルの初期化とダウンロード
        async function initModel() {
            statusEl.innerText = "モデル読込中(初回は数百MBの通信が発生します)";
            try {
                // 軽量なテキスト生成モデルを指定
                generator = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                    progress_callback: (x) => {
                        if (x.status === 'progress') {
                            // アニメーションバーの代わりにテキストのみで進捗表示
                            statusEl.innerText = `ダウンロード中... ${Math.round(x.progress)}%`;
                        }
                    }
                });
                statusEl.innerText = "準備完了";
                inputField.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusEl.innerText = "エラー: " + error.message;
            }
        }

        // 画面へのメッセージ追加処理
        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            // 最新のメッセージまでスクロール（アニメーションなしの即時移動）
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 送信ボタンのクリックイベント
        sendBtn.addEventListener('click', async () => {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;
            statusEl.innerText = "AIが思考中...";

            try {
                // TinyLlama用のプロンプトフォーマット
                const prompt = `<|system|>\nあなたはAIアシスタントです。簡潔に答えてください。</s>\n<|user|>\n${text}</s>\n<|assistant|>\n`;

                const output = await generator(prompt, {
                    max_new_tokens: 100, // スマホの負荷を考慮し、生成トークン数を制限
                    temperature: 0.7,
                    do_sample: true
                });

                // プロンプト部分を除去してAIの返答のみを抽出
                let response = output[0].generated_text.replace(prompt, '').trim();
                appendMessage(response, 'ai');
                
            } catch (error) {
                appendMessage("生成中にエラーが発生しました。", 'ai');
            }

            statusEl.innerText = "待機中";
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        });

        // エンターキーでの送信対応
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendBtn.click();
            }
        });

        // 起動時にモデルのロードを開始
        initModel();
    </script>
</body>
</html>
