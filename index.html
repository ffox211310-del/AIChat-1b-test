<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: none !important;
            animation: none !important;
        }

        body {
            background-color: #000000;
            color: #00BFFF;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #003399;
            color: #00BFFF;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #00BFFF;
        }

        #status {
            font-size: 12px;
            margin-top: 5px;
            color: #00BFFF;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user {
            background-color: #003399;
            color: #00BFFF;
            align-self: flex-end;
            border: 1px solid #00BFFF;
        }

        .ai {
            background-color: #000000;
            color: #00BFFF;
            align-self: flex-start;
            border: 1px solid #003399;
        }

        #input-area {
            display: flex;
            padding: 10px;
            background-color: #000000;
            border-top: 2px solid #003399;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background-color: #000000;
            border: 1px solid #00BFFF;
            color: #00BFFF;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #003399;
        }

        button {
            padding: 12px 20px;
            background-color: #003399;
            color: #00BFFF;
            border: 1px solid #00BFFF;
            font-weight: bold;
            font-size: 16px;
        }

        button:disabled {
            background-color: #111111;
            color: #333333;
            border-color: #333333;
        }
    </style>
</head>
<body>

    <header>
        <div>Local AI Chat</div>
        <div id="status">システム起動中...</div>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

        env.allowLocalModels = false;
        
        /* 【重要】メモリ節約設定 */
        // スレッド数を1に制限して、並列処理によるメモリ爆発を防ぐ
        env.backends.onnx.wasm.numThreads = 1;

        const statusEl = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let generator;

        async function initModel() {
            statusEl.innerText = "モデル読込中(初回は数百MBの通信が発生します)";
            try {
                // スマホでも動きやすい超軽量モデル（約350MB）に変更
                generator = await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', {
                    quantized: true, // 明示的に量子化（圧縮）版を指定
                    progress_callback: (x) => {
                        if (x.status === 'progress') {
                            statusEl.innerText = `ダウンロード中... ${Math.round(x.progress)}%`;
                        }
                    }
                });
                statusEl.innerText = "準備完了";
                inputField.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusEl.innerText = "エラー: " + error.message;
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', async () => {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;
            statusEl.innerText = "AIが思考中...";

            try {
                // Qwen用のプロンプトフォーマットに最適化
                const prompt = `<|im_start|>system\nあなたは優秀なアシスタントです。簡潔に日本語で答えてください。<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

                const output = await generator(prompt, {
                    max_new_tokens: 60, // スマホの負荷を減らすため、一度に生成する文字数をさらに制限
                    temperature: 0.7,
                    do_sample: true
                });

                // 返答部分だけを綺麗に抽出
                let response = output[0].generated_text.split('<|im_start|>assistant\n').pop().replace('<|im_end|>', '').trim();
                appendMessage(response, 'ai');
                
            } catch (error) {
                appendMessage("エラー詳細: " + error.message, 'ai');
            }

            statusEl.innerText = "待機中";
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        });

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendBtn.click();
            }
        });

        initModel();
    </script>
</body>
</html>
