<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゼロから作る単語の意味ベクトル - 類推できるAI</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #12122a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', monospace;
            padding: 1rem;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #a78bfa; margin: 0 0 0.5rem 0; }
        .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1rem; }
        textarea {
            width: 100%;
            background: #0a0a14;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 0.8rem;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 0.85rem;
        }
        button {
            background: linear-gradient(95deg, #6366f1, #8b5cf6);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 0.5rem 0.5rem 0 0;
            font-family: monospace;
        }
        button:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .output {
            background: #0a0a14;
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid #a78bfa;
            margin-top: 0.5rem;
            color: #facc15;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .similarity-bar {
            background: #1a1a2a;
            border-radius: 0.5rem;
            padding: 0.3rem;
            margin: 0.2rem 0;
        }
        .bar-fill {
            background: linear-gradient(90deg, #a78bfa, #6366f1);
            height: 1.5rem;
            border-radius: 0.3rem;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.5rem;
            color: white;
            font-size: 0.7rem;
        }
        .status {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🧬 ゼロから作る「単語の意味ベクトル」</h1>
        <div class="sub">ニューラルネットが「犬と猫は似ている」を自動学習。学習データにない単語の類推も可能に</div>
        
        <textarea id="corpus" rows="4">私は犬が好きです 私は猫も好きです 犬と散歩するのは楽しい 猫はかわいい 今日は天気がいい 散歩に最適な天気 楽しい散歩 かわいい犬 かわいい猫</textarea>
        
        <div>
            <button id="trainBtn">🧠 学習開始 (ニューラルネットをゼロから)</button>
            <button id="analogyBtn">🔍 類推テスト (例: 犬 → 猫 の関係は？)</button>
            <button id="similarBtn">⭐ 似ている単語を表示</button>
        </div>
        <div class="status" id="status">未学習。学習ボタンを押すと単語をベクトル化します</div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>📝 単語ベクトル (20次元)</h3>
            <div id="wordVectors" style="font-size: 0.7rem; max-height: 300px; overflow-y: auto; color: #86efac; font-family: monospace;"></div>
        </div>
        <div class="card">
            <h3>🎯 類推 / 類似度</h3>
            <input type="text" id="word1" placeholder="単語1" style="width:100%; margin-bottom:0.3rem; background:#0a0a14; border:1px solid #334155; border-radius:0.5rem; padding:0.3rem;">
            <input type="text" id="word2" placeholder="単語2" style="width:100%; margin-bottom:0.5rem; background:#0a0a14; border:1px solid #334155; border-radius:0.5rem; padding:0.3rem;">
            <button id="cosineBtn" style="width:100%;">コサイン類似度</button>
            <div id="similarityResult" class="output" style="margin-top:0.5rem; font-size:0.8rem;"></div>
        </div>
    </div>

    <div class="card">
        <h3>✨ 文章生成 (意味ベクトルから次の単語を予測)</h3>
        <input type="text" id="seedText" placeholder="最初の1単語" value="犬" style="width:70%; background:#0a0a14; border:1px solid #334155; border-radius:2rem; padding:0.5rem 1rem;">
        <button id="generateAdvancedBtn">🎲 単語から新しい文を生成</button>
        <div id="generatedSentence" class="output"></div>
    </div>
</div>

<script>
    // ============================================
    // ゼロからのニューラルネット: 単語の埋め込みを学習する
    // Skip-gram 風の超簡易版: 周辺単語を予測することで意味を獲得
    // ============================================
    
    let wordToId = new Map();
    let idToWord = [];
    let embeddingDim = 16;  // 16次元の意味ベクトル
    let embeddings = null;   // 単語ベクトル行列 [vocabSize][embeddingDim]
    let contextWeights = null; // 出力層の重み
    
    let trained = false;
    
    // トークナイズ (シンプル)
    function tokenize(text) {
        const matches = text.match(/[\p{L}\p{N}]+/gu);
        return matches ? matches.map(w => w.toLowerCase()) : [];
    }
    
    // 学習データの準備: コーパスから (中心単語, 周辺単語) のペアを作る
    function buildTrainingPairs(corpusText) {
        const lines = corpusText.split(/\r?\n/);
        const pairs = [];
        const allWords = [];
        
        for (let line of lines) {
            const tokens = tokenize(line);
            if (tokens.length < 2) continue;
            allWords.push(...tokens);
            // window size = 2
            for (let i = 0; i < tokens.length; i++) {
                const center = tokens[i];
                for (let j = Math.max(0, i-2); j <= Math.min(tokens.length-1, i+2); j++) {
                    if (i === j) continue;
                    pairs.push({ center, context: tokens[j] });
                }
            }
        }
        
        // 単語IDの構築
        for (let w of allWords) {
            if (!wordToId.has(w)) {
                wordToId.set(w, idToWord.length);
                idToWord.push(w);
            }
        }
        
        // ペアをID変換
        const idPairs = [];
        for (let p of pairs) {
            const cId = wordToId.get(p.center);
            const ctxId = wordToId.get(p.context);
            if (cId !== undefined && ctxId !== undefined) {
                idPairs.push({ center: cId, context: ctxId });
            }
        }
        return idPairs;
    }
    
    // 重み初期化 (Xavier初期化)
    function initWeights(vocabSize) {
        embeddings = Array(vocabSize).fill().map(() => 
            Array(embeddingDim).fill().map(() => (Math.random() - 0.5) * Math.sqrt(2 / embeddingDim))
        );
        contextWeights = Array(vocabSize).fill().map(() => 
            Array(embeddingDim).fill().map(() => (Math.random() - 0.5) * Math.sqrt(2 / embeddingDim))
        );
    }
    
    // シグモイド関数
    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }
    
    // フォワード: 中心単語ベクトルとコンテキスト単語ベクトルの内積 → 確率
    function forward(centerId, contextId) {
        const centerVec = embeddings[centerId];
        const contextVec = contextWeights[contextId];
        let dot = 0;
        for (let i = 0; i < embeddingDim; i++) {
            dot += centerVec[i] * contextVec[i];
        }
        return sigmoid(dot);
    }
    
    // 学習: 正例(center,context)と負例(ランダムサンプリング)で勾配降下
    function trainStep(pairs, learningRate = 0.05, negSamples = 5) {
        let totalLoss = 0;
        for (let pair of pairs) {
            const centerId = pair.center;
            const contextId = pair.context;
            const target = 1; // 正例は1
            
            // 正例の予測
            const pred = forward(centerId, contextId);
            const lossPos = -Math.log(pred + 1e-8);
            totalLoss += lossPos;
            
            // 勾配計算 (正例)
            const gradPos = pred - target;
            // 更新: 中心ベクトルとコンテキストベクトル
            for (let i = 0; i < embeddingDim; i++) {
                const gradCenter = gradPos * contextWeights[contextId][i];
                const gradContext = gradPos * embeddings[centerId][i];
                embeddings[centerId][i] -= learningRate * gradCenter;
                contextWeights[contextId][i] -= learningRate * gradContext;
            }
            
            // 負例: ランダムに単語を選ぶ
            for (let n = 0; n < negSamples; n++) {
                const negId = Math.floor(Math.random() * embeddings.length);
                if (negId === contextId) continue;
                const negPred = forward(centerId, negId);
                const negTarget = 0;
                const negLoss = -Math.log(1 - negPred + 1e-8);
                totalLoss += negLoss;
                const gradNeg = negPred - negTarget;
                for (let i = 0; i < embeddingDim; i++) {
                    embeddings[centerId][i] -= learningRate * (gradNeg * contextWeights[negId][i]);
                    contextWeights[negId][i] -= learningRate * (gradNeg * embeddings[centerId][i]);
                }
            }
        }
        return totalLoss / pairs.length;
    }
    
    // コサイン類似度
    function cosineSimilarity(vecA, vecB) {
        let dot = 0, normA = 0, normB = 0;
        for (let i = 0; i < embeddingDim; i++) {
            dot += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        return dot / (Math.sqrt(normA) * Math.sqrt(normB) + 1e-8);
    }
    
    // 類似単語トップN
    function mostSimilar(word, topN = 5) {
        if (!wordToId.has(word)) return [];
        const wordId = wordToId.get(word);
        const wordVec = embeddings[wordId];
        const similarities = [];
        for (let i = 0; i < embeddings.length; i++) {
            if (i === wordId) continue;
            const sim = cosineSimilarity(wordVec, embeddings[i]);
            similarities.push({ word: idToWord[i], sim });
        }
        similarities.sort((a,b) => b.sim - a.sim);
        return similarities.slice(0, topN);
    }
    
    // 類推: a : b :: c : ?
    function analogy(a, b, c) {
        if (!wordToId.has(a) || !wordToId.has(b) || !wordToId.has(c)) return null;
        const vecA = embeddings[wordToId.get(a)];
        const vecB = embeddings[wordToId.get(b)];
        const vecC = embeddings[wordToId.get(c)];
        const targetVec = vecB.map((v, i) => v - vecA[i] + vecC[i]);
        
        let bestWord = null;
        let bestSim = -Infinity;
        for (let i = 0; i < embeddings.length; i++) {
            if (idToWord[i] === a || idToWord[i] === b || idToWord[i] === c) continue;
            const sim = cosineSimilarity(targetVec, embeddings[i]);
            if (sim > bestSim) {
                bestSim = sim;
                bestWord = idToWord[i];
            }
        }
        return { word: bestWord, similarity: bestSim };
    }
    
    // 文章生成: 与えられた単語の次に来る確率が高い単語をベクトルで予測
    function generateNextWord(prevWord) {
        if (!wordToId.has(prevWord)) return null;
        const prevVec = embeddings[wordToId.get(prevWord)];
        let bestWord = null;
        let bestScore = -Infinity;
        for (let i = 0; i < embeddings.length; i++) {
            const sim = cosineSimilarity(prevVec, embeddings[i]);
            if (sim > bestScore && idToWord[i] !== prevWord) {
                bestScore = sim;
                bestWord = idToWord[i];
            }
        }
        return bestWord;
    }
    
    function generateSentence(startWord, maxLen=8) {
        let sentence = [startWord];
        let current = startWord;
        for (let i = 0; i < maxLen; i++) {
            const next = generateNextWord(current);
            if (!next || sentence.includes(next)) break;
            sentence.push(next);
            current = next;
        }
        return sentence.join(' ');
    }
    
    // UI 表示
    function displayVectors() {
        const div = document.getElementById('wordVectors');
        if (!embeddings) {
            div.innerHTML = '学習していません';
            return;
        }
        let html = '';
        for (let [word, id] of wordToId.entries()) {
            const vec = embeddings[id];
            const shortVec = vec.map(v => v.toFixed(2)).join(', ');
            html += `<strong>${word}</strong>: [${shortVec}]<br>`;
        }
        div.innerHTML = html;
    }
    
    // 学習メイン
    async function train() {
        const corpus = document.getElementById('corpus').value;
        if (!corpus.trim()) return;
        document.getElementById('status').innerHTML = '🔄 学習中... (単語ベクトルをゼロから作成)';
        await new Promise(r => setTimeout(r, 50));
        
        const pairs = buildTrainingPairs(corpus);
        if (idToWord.length === 0) {
            document.getElementById('status').innerHTML = '⚠️ 単語が見つかりません';
            return;
        }
        initWeights(idToWord.length);
        
        const epochs = 200;
        for (let epoch = 0; epoch < epochs; epoch++) {
            const loss = trainStep(pairs, 0.08, 3);
            if (epoch % 50 === 0) {
                document.getElementById('status').innerHTML = `🧪 学習中: epoch ${epoch}/${epochs}, loss=${loss.toFixed(4)}`;
                await new Promise(r => setTimeout(r, 10));
            }
        }
        trained = true;
        document.getElementById('status').innerHTML = '✅ 学習完了！ 単語の意味ベクトルが獲得されました。類推や類似度を試せる';
        displayVectors();
    }
    
    // イベント
    document.getElementById('trainBtn').onclick = () => train();
    document.getElementById('cosineBtn').onclick = () => {
        if (!trained) { alert('先に学習'); return; }
        const w1 = document.getElementById('word1').value.trim().toLowerCase();
        const w2 = document.getElementById('word2').value.trim().toLowerCase();
        if (!wordToId.has(w1) || !wordToId.has(w2)) {
            document.getElementById('similarityResult').innerHTML = '単語が見つかりません';
            return;
        }
        const sim = cosineSimilarity(embeddings[wordToId.get(w1)], embeddings[wordToId.get(w2)]);
        document.getElementById('similarityResult').innerHTML = `「${w1}」と「${w2}」の類似度: ${sim.toFixed(4)} (1に近いほど意味が近い)`;
    };
    document.getElementById('analogyBtn').onclick = () => {
        if (!trained) { alert('先に学習'); return; }
        const res = analogy('犬', 'かわいい', '猫');
        if (res) document.getElementById('similarityResult').innerHTML = `🐕 → かわいい : 🐈 → ? <br> 答え: 「${res.word}」 (類似度 ${res.similarity.toFixed(3)})`;
        else document.getElementById('similarityResult').innerHTML = '類推失敗、もう少し学習データを増やして';
    };
    document.getElementById('similarBtn').onclick = () => {
        if (!trained) return;
        const word = prompt('類似単語を知りたい単語は？', '犬');
        if (!word || !wordToId.has(word)) return;
        const sims = mostSimilar(word);
        document.getElementById('similarityResult').innerHTML = `「${word}」に似ている単語:<br>${sims.map(s => `${s.word} (${s.sim.toFixed(3)})`).join('<br>')}`;
    };
    document.getElementById('generateAdvancedBtn').onclick = () => {
        if (!trained) { alert('学習が必要'); return; }
        const seed = document.getElementById('seedText').value.trim().toLowerCase();
        if (!wordToId.has(seed)) { document.getElementById('generatedSentence').innerHTML = 'その単語は学習していません'; return; }
        const sentence = generateSentence(seed);
        document.getElementById('generatedSentence').innerHTML = `✨ ${sentence} ...`;
    };
</script>
</body>
</html>
